<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

    <meta charset="UTF-8">
    <title> تأكيد الدفع - البوصلة</title>
    <!-- <link rel="stylesheet" href="login-signup.css"> -->
    <link rel="stylesheet" href="shopping.css?v=4">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"><!--مكتبة ايقونات-->
</head>

<body>
<header class="main-header">
    <nav>
        <ul class="navbar">
            <li class="user-menu">
                <a href="#" class="user-icon guest"> <i class="fas fa-chevron-down"></i>
                    <i class="fas fa-user-circle"></i>
                </a>
                <ul class="dropdown-content">
                    <li class="user-email-display">Guest@Al-Bousala.com</li>
                </ul>
            </li>
            <li><a href="home.html">الرئيسية</a></li>
            <li><a href="home.html#story">قصتـنا</a></li>
            <li> <a href="home.html#categories">الـحضـارات</a></li>
            <!--  <li><a href="#">مـلابـس</a></li> -->
            <li><a href="login.html" class="login-btn login-link">تسجيل الدخول</a></li>
        </ul>
    </nav>
    <div class="logo">
        <a href="home.html">
            <img src="images/logo.png" alt="البوصلة">
        </a>
    </div>
</header>

<main class="checkout-container">
    <div class="checkout-grid">
        <section class="billing-form">
            <h2>تفاصيل الشحن</h2>
            <form id="orderForm">
                <div class="input-group">
                    <input type="text" name="fname" placeholder="الاسم الأول" required>
                    <input type="text" name="lname" placeholder="الاسم الأخير" required>
                </div>
                <input type="email" name="email" placeholder="البريد الإلكتروني" required>
                <input type="text" name="phone" placeholder="رقم الهاتف" required>
                <textarea name="address" placeholder="عنوان التوصيل بالتفصيل" required></textarea>

                <button type="submit" class="place-order-btn">تأكيد الطلب الآن</button>
            </form>
        </section>

         <aside class="mini-summary">
            <h3>ملخصك</h3>
            <div class="summary-line"><span>المجموع الفرعي:</span> <span id="co-subtotal">0 ر.س</span></div>
            <div class="summary-line"><span>التوصيل:</span> <span id="co-shipping">50 ر.س</span></div>
            <div class="summary-line" id="co-discount-row" style="display:none;color:#27ae60">
                <span>خصم 5%:</span> <span id="co-discount">0 ر.س</span>
            </div>
            <hr>
            <div class="summary-line total"><span>الإجمالي:</span> <span id="co-total">0 ر.س</span></div>
        </aside>
    </div>
</main>

<div class="footer-bottom">
    <div class="copyright">
        <p>&copy; جميع الحقوق محفوظة لـ (Al-Bousala) البوصلة 2026</p>
    </div>

    <div class="social-icons">
        <a href="#"><i class="fab fa-instagram"></i></a>
        <a href="#"><i class="fab fa-twitter"></i></a>
        <a href="#"><i class="fab fa-facebook-f"></i></a>
    </div>

    <div class="bottom-links">
        <a href="#">الشروط والأحكام</a>
        <a href="#">سياسة الخصوصية</a>
    </div>
</div>
<script src="bousala.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async () => {
    try {
        const res  = await fetch('backend/cart.php?action=view');
        const data = await res.json();
        if (data.success && data.totals) {
            const t = data.totals;
            document.getElementById('co-subtotal').textContent = Number(t.subtotal) + ' ر.س';
            document.getElementById('co-shipping').textContent  = Number(t.shipping) + ' ر.س';
            document.getElementById('co-total').textContent     = Number(t.total) + ' ر.س';
            if (t.discount > 0) {
                document.getElementById('co-discount').textContent = Number(t.discount) + ' ر.س';
                document.getElementById('co-discount-row').style.display = '';
            }
        }
    } catch(e) {}

    const orderForm = document.getElementById('orderForm');
    if (orderForm) {
        orderForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const submitBtn = orderForm.querySelector('button[type="submit"]');
            const originalText = submitBtn.textContent;
            submitBtn.disabled = true;
            submitBtn.textContent = 'جاري معالجة الطلب...';
            
            const formData = new FormData(orderForm);
            
            try {
                const res = await fetch('backend/proc_order.php', {
                    method: 'POST',
                    body: formData,
                    headers: {
                        'X-Requested-With': 'XMLHttpRequest'
                    }
                });

                const data = await res.json();
                
                if (data.success) {
                    Cart.showToast(data.message, 'success');
                    setTimeout(() => {
                        window.location.href = 'home.html';
                    }, 7000);
                } else {
                    Cart.showToast(data.message || 'حدث خطأ في معالجة الطلب', 'error');
                    submitBtn.disabled = false;
                    submitBtn.textContent = originalText;
                }
            } catch(e) {
                Cart.showToast('تعذر الاتصال بالخادم', 'error');
                submitBtn.disabled = false;
                submitBtn.textContent = originalText;
            }
        });
    }
});
</script>
</body>

</html>
