    <link rel="stylesheet" href="shopping.css?v=4">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"><!--مكتبة ايقونات-->
</head>

<body>
<header class="main-header">
    <nav>
        <ul class="navbar">
            <li class="user-menu">
                <a href="#" class="user-icon guest"> <i class="fas fa-chevron-down"></i>
                    <i class="fas fa-user-circle"></i>
                </a>
                <ul class="dropdown-content">
                    <li class="user-email-display">Guest@Al-Bousala.com</li>
                </ul>
            </li>
            <li><a href="home.html">الرئيسية</a></li>
            <li><a href="home.html#story">قصتـنا</a></li>
            <li> <a href="home.html#categories">الـحضـارات</a></li>
          <!--  <li><a href="#">مـلابـس</a></li> -->
            <li><a href="login.html" class="login-btn login-link">تسجيل الدخول</a></li>
        </ul>
    </nav>
    <div class="logo">
        <a href="home.html">
            <img src="images/logo.png" alt="البوصلة">
        </a>
    </div>
</header>

<main class="cart-container">
    <div class="cart-items-section">
        <h2 class="section-title">سلة المشتريات </h2>
     <div id="cart-loading" style="text-align:center;padding:50px;color:#888">
         <i class="fas fa-spinner fa-spin" style="font-size:28px;color:#c4a35a"></i>
         <p style="margin-top:12px">جار تحميل السلة...</p>
    </div>
    </div>

    <aside class="order-summary">
        <div class="summary-content">
            <h3>ملخص الطلب</h3>
            <div class="summary-details">
                <div class="summary-row">
                    <span>المجموع الفرعي:</span>
                    <span id="cart-subtotal">0 ر.س</span>
                </div>

                <div class="discount-label" id="discount-row" style="display:none">
                    <i class="fas fa-tag"></i>
                    <span id="discount-text">خصم خاص : 5%</span>
                </div>

                <div class="summary-row">
                    <span>التوصيل:</span>
                    <span id="cart-shipping">0 ر.س</span>
                </div>
                <hr>
                <div class="summary-row total">
                    <span>الإجمالي:</span>
                    <span class="total-amount" id="cart-total">0 ر.س</span>
                </div>
            </div>
            <a href="checkout.html" class="checkout-btn">إتمام الشراء</a>
        </div>
    </aside>
</main>

<div class="footer-bottom">
    <div class="copyright">
        <p>&copy; جميع الحقوق محفوظة لـ (Al-Bousala) البوصلة 2026</p>
    </div>

    <div class="social-icons">
        <a href="#"><i class="fab fa-instagram"></i></a>
        <a href="#"><i class="fab fa-twitter"></i></a>
        <a href="#"><i class="fab fa-facebook-f"></i></a>
    </div>

    <div class="bottom-links">
        <a href="#">الشروط والأحكام</a>
        <a href="#">سياسة الخصوصية</a>
    </div>
</div>

<script src="bousala.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async () => {
    const section = document.querySelector('.cart-items-section');
    const loading = document.getElementById('cart-loading');

    try {
        const res  = await fetch('backend/cart.php?action=view');
        const data = await res.json();
        loading.remove();

        if (!data.success || data.items.length === 0) {
            window.location.href = 'cart-empty.html';
            return;
        }

        section.querySelector('.section-title').textContent =
            `سلة المشتريات (${data.items.length} ${data.items.length === 1 ? 'منتج' : 'منتجات'})`;

        data.items.forEach(item => {
            const div = document.createElement('div');
            div.className = 'cart-item-horizontal';
            div.dataset.itemId = item.id;
            div.innerHTML = `
                <img src="${item.image || 'images/logo.png'}" alt="${item.name}">
                <div class="item-details">
                    <h3>${item.name}</h3>
                    <span class="item-price">${Number(item.price)} ر.س</span>
                </div>
                <div class="item-actions">
                    <div class="quantity-box">
                        <button onclick="updateQty(${item.id}, parseInt(document.getElementById('qty-${item.id}').textContent) + 1)">+</button>
                        <span id="qty-${item.id}">${item.quantity}</span>
                        <button onclick="updateQty(${item.id}, parseInt(document.getElementById('qty-${item.id}').textContent) - 1)">-</button>
                    </div>
                    <button class="remove-btn" onclick="removeItem(${item.id})">
                        <i class="fas fa-trash-alt"></i>
                    </button>
                </div>`;
            section.appendChild(div);
        });

        updateSummary(data.totals);

    } catch(e) {
        loading.innerHTML = '<p style="color:red;text-align:center">تعذر تحميل السلة، يرجى المحاولة مجدداً</p>';
    }
});

function updateSummary(t) {
    if(document.getElementById('cart-subtotal'))
        document.getElementById('cart-subtotal').textContent = Number(t.subtotal) + ' ر.س';

    if(document.getElementById('cart-shipping'))
        document.getElementById('cart-shipping').textContent  = Number(t.shipping) + ' ر.س';

    if(document.getElementById('cart-total'))
        document.getElementById('cart-total').textContent     = Number(t.total) + ' ر.س';

    const discRow = document.getElementById('discount-row');
    const discText = document.getElementById('discount-text');

    if (t.discount > 0) {
        if (discText) {
            discText.textContent = `خصم خاص : ${t.discount_pct}%`;
        }
        if (discRow) discRow.style.display = 'flex';
    } else {
        if (discRow) discRow.style.display = 'none';
    }
}

async function updateQty(itemId, qty) {
    if (qty <= 0) { removeItem(itemId); return; }
    const body = new FormData();
    body.append('action',   'update');
    body.append('item_id',  itemId);
    body.append('quantity', qty);
    const res  = await fetch('backend/cart.php', { method: 'POST', body });
    const data = await res.json();
    if (data.success) {
        document.getElementById('qty-' + itemId).textContent = qty;
        updateSummary(data.totals);
        Cart.updateBadge();
    } else {
        Cart.showToast(data.message, 'error');
    }
}

async function removeItem(itemId) {
    const body = new FormData();
    body.append('action',  'remove');
    body.append('item_id', itemId);
    const res  = await fetch('backend/cart.php', { method: 'POST', body });
    const data = await res.json();
    if (data.success) {
        const el = document.querySelector(`[data-item-id="${itemId}"]`);
        if (el) el.remove();
        if (data.count === 0) { window.location.href = 'cart-empty.html'; return; }
        updateSummary(data.totals);
        Cart.updateBadge();
        document.querySelector('.section-title').textContent = `سلة المشتريات (${data.count} منتجات)`;
    }
}
</script>
</body>
</html>
